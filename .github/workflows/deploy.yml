name: Deploy CG-vetement

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: cg-vetement-deploy
  cancel-in-progress: true

jobs:
  github-pages:
    name: GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html admin.html store.js catalog.json _redirects _site/
      - name: Enable & configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
        continue-on-error: true
      - name: Upload artifact
        id: upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
        continue-on-error: true
      - name: Deploy Pages
        if: steps.upload.outcome == 'success'
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Fallback deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
          full_commit_message: "Deploy CG-vetement"

  netlify:
    name: Netlify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "::warning::Secrets Netlify absents — déploiement ignoré."
            echo "Dans Netlify : site CG-vetement → Link repository → xavMich/ceid-sciences-marius"
            echo "Ou ajoutez NETLIFY_AUTH_TOKEN + NETLIFY_SITE_ID dans les secrets GitHub."
            exit 0
          fi
          npx --yes netlify-cli deploy --prod --dir=. --site="$NETLIFY_SITE_ID" --auth="$NETLIFY_AUTH_TOKEN" --message "CG-vetement $(git rev-parse --short HEAD)"
