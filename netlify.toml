[build]
  publish = "."
  command = "echo 'CG-vetement static site — no build'"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/achats"
  to = "/admin.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[dev]
  framework = "#static"
  publish = "."
